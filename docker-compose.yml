version: '3.8'

services:
  aggregator:
    build: .
    container_name: aggregator
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    command: python -m uvicorn src.main:app --host 0.0.0.0 --port 8000

  publisher:
    build: .
    container_name: publisher
    depends_on:
      - aggregator
    command: python src/publisher.py
